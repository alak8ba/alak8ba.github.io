<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-bot" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1b1530"/>
      <stop offset="100%" style="stop-color:#0d0a1a"/>
    </linearGradient>
    <filter id="glow-indigo">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond hexagonal • cohérent avec les autres logos KORE -->
  <polygon points="100,8 178,52 178,148 100,192 22,148 22,52"
           fill="url(#bg-bot)" stroke="#818cf8" stroke-width="2"/>

  <!-- Hexagone intérieur décoratif -->
  <polygon points="100,28 162,63 162,137 100,172 38,137 38,63"
           fill="none" stroke="#818cf8" stroke-width="0.5" opacity="0.3"/>

  <!-- Symbole : bulle de chat avec antenne (bot conversationnel) -->
  <rect x="68" y="62" width="64" height="46" rx="10"
        fill="none" stroke="#818cf8" stroke-width="3"
        stroke-linecap="round" filter="url(#glow-indigo)"/>
  <!-- Queue de bulle -->
  <path d="M 84 108 L 84 120 L 98 108 Z" fill="#818cf8" filter="url(#glow-indigo)"/>

  <!-- Antenne -->
  <line x1="100" y1="62" x2="100" y2="50" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round"/>
  <circle cx="100" cy="46" r="4" fill="#818cf8" filter="url(#glow-indigo)"/>

  <!-- Yeux du bot -->
  <circle cx="86" cy="84" r="4.5" fill="#818cf8" filter="url(#glow-indigo)"/>
  <circle cx="114" cy="84" r="4.5" fill="#818cf8" filter="url(#glow-indigo)"/>

  <!-- Sourire -->
  <path d="M 88 96 Q 100 104 112 96" fill="none" stroke="#818cf8" stroke-width="2.5" stroke-linecap="round"/>

  <!-- Texte KORE -->
  <text x="100" y="148" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-weight="700"
        font-size="20" fill="#818cf8" letter-spacing="3">KORE</text>

  <!-- Texte BOT -->
  <text x="100" y="166" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-weight="400"
        font-size="10" fill="#818cf8" opacity="0.6" letter-spacing="4">BOT</text>
</svg>

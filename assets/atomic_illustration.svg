<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 420" width="800" height="420">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1e3d"/>
      <stop offset="100%" style="stop-color:#1a3a6b"/>
    </linearGradient>
    <linearGradient id="atomicGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2e6db4"/>
      <stop offset="100%" style="stop-color:#4a9fd4"/>
    </linearGradient>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a9fd4"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#e05252"/>
    </marker>
    <marker id="arrowGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4caf82"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="420" fill="url(#bg)" rx="16"/>

  <!-- Title -->
  <text x="400" y="38" font-family="monospace" font-size="16" fill="#4a9fd4" text-anchor="middle" font-weight="bold">Compare-and-Swap (CAS) - Atomic en Java</text>
  <line x1="60" y1="50" x2="740" y2="50" stroke="#2e6db4" stroke-width="1" opacity="0.4"/>

  <!-- LEFT SIDE: synchronized -->
  <text x="185" y="80" font-family="monospace" font-size="13" fill="#e05252" text-anchor="middle" font-weight="bold">synchronized</text>

  <!-- Lock icon -->
  <rect x="155" y="90" width="60" height="45" rx="6" fill="#e05252" opacity="0.15" stroke="#e05252" stroke-width="1.5"/>
  <text x="185" y="120" font-family="monospace" font-size="20" fill="#e05252" text-anchor="middle">🔒</text>

  <!-- Threads waiting -->
  <rect x="80" y="160" width="80" height="32" rx="6" fill="#1a3a6b" stroke="#2e6db4" stroke-width="1.5"/>
  <text x="120" y="181" font-family="monospace" font-size="12" fill="white" text-anchor="middle">Thread 1</text>

  <rect x="80" y="205" width="80" height="32" rx="6" fill="#1a3a6b" stroke="#e05252" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="120" y="226" font-family="monospace" font-size="12" fill="#e05252" text-anchor="middle">Thread 2 ⏳</text>

  <rect x="80" y="250" width="80" height="32" rx="6" fill="#1a3a6b" stroke="#e05252" stroke-width="1.5" stroke-dasharray="4"/>
  <text x="120" y="271" font-family="monospace" font-size="12" fill="#e05252" text-anchor="middle">Thread 3 ⏳</text>

  <!-- Arrow from thread 1 to lock -->
  <line x1="160" y1="176" x2="185" y2="135" stroke="#4a9fd4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Blocked label -->
  <text x="185" y="310" font-family="monospace" font-size="11" fill="#e05252" text-anchor="middle">Bloqués - attente du lock</text>

  <!-- Counter display synchronized -->
  <rect x="140" y="330" width="90" height="36" rx="8" fill="#0f1e3d" stroke="#e05252" stroke-width="1.5"/>
  <text x="185" y="345" font-family="monospace" font-size="10" fill="#888" text-anchor="middle">counter</text>
  <text x="185" y="360" font-family="monospace" font-size="16" fill="white" text-anchor="middle" font-weight="bold">42</text>

  <!-- DIVIDER -->
  <line x1="370" y1="60" x2="370" y2="400" stroke="#2e6db4" stroke-width="1" opacity="0.3" stroke-dasharray="6"/>
  <text x="370" y="230" font-family="monospace" font-size="11" fill="#4a9fd4" text-anchor="middle" transform="rotate(-90,370,230)">VS</text>

  <!-- RIGHT SIDE: Atomic CAS -->
  <text x="580" y="80" font-family="monospace" font-size="13" fill="#4caf82" text-anchor="middle" font-weight="bold">AtomicInteger - CAS</text>

  <!-- Memory cell -->
  <rect x="530" y="90" width="100" height="45" rx="6" fill="#4caf82" opacity="0.15" stroke="#4caf82" stroke-width="1.5"/>
  <text x="580" y="108" font-family="monospace" font-size="10" fill="#4caf82" text-anchor="middle">memory value</text>
  <text x="580" y="128" font-family="monospace" font-size="18" fill="white" text-anchor="middle" font-weight="bold">42</text>

  <!-- Threads all active -->
  <rect x="430" y="160" width="80" height="32" rx="6" fill="#1a3a6b" stroke="#4caf82" stroke-width="1.5"/>
  <text x="470" y="181" font-family="monospace" font-size="12" fill="white" text-anchor="middle">Thread 1</text>

  <rect x="530" y="160" width="80" height="32" rx="6" fill="#1a3a6b" stroke="#4caf82" stroke-width="1.5"/>
  <text x="570" y="181" font-family="monospace" font-size="12" fill="white" text-anchor="middle">Thread 2</text>

  <rect x="630" y="160" width="80" height="32" rx="6" fill="#1a3a6b" stroke="#4caf82" stroke-width="1.5"/>
  <text x="670" y="181" font-family="monospace" font-size="12" fill="white" text-anchor="middle">Thread 3</text>

  <!-- CAS steps -->
  <rect x="430" y="215" width="320" height="70" rx="8" fill="#0f1e3d" stroke="#2e6db4" stroke-width="1"/>
  <text x="590" y="235" font-family="monospace" font-size="11" fill="#4a9fd4" text-anchor="middle" font-weight="bold">CAS(expected=42, new=43)</text>
  <text x="590" y="255" font-family="monospace" font-size="10" fill="#888" text-anchor="middle">1. Lis la valeur actuelle → 42</text>
  <text x="590" y="270" font-family="monospace" font-size="10" fill="#888" text-anchor="middle">2. Si valeur == 42, échange → 43 ✓</text>
  <text x="590" y="285" font-family="monospace" font-size="10" fill="#e05252" text-anchor="middle">3. Sinon → retry automatique</text>

  <!-- Success label -->
  <text x="590" y="315" font-family="monospace" font-size="11" fill="#4caf82" text-anchor="middle">Pas de lock - opération CPU native</text>

  <!-- Counter display atomic -->
  <rect x="540" y="330" width="90" height="36" rx="8" fill="#0f1e3d" stroke="#4caf82" stroke-width="1.5"/>
  <text x="585" y="345" font-family="monospace" font-size="10" fill="#888" text-anchor="middle">AtomicInteger</text>
  <text x="585" y="360" font-family="monospace" font-size="16" fill="white" text-anchor="middle" font-weight="bold">43</text>

  <!-- Code snippet bottom -->
  <rect x="60" y="385" width="680" height="24" rx="4" fill="#0a1628" opacity="0.8"/>
  <text x="400" y="401" font-family="monospace" font-size="11" fill="#4a9fd4" text-anchor="middle">AtomicInteger counter = new AtomicInteger(42);   counter.incrementAndGet();  // thread-safe, no lock</text>
</svg>

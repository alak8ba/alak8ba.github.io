<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg-kafka" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a1a10"/>
      <stop offset="100%" style="stop-color:#1a0f0a"/>
    </linearGradient>
    <linearGradient id="kafka-orange" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#ea580c"/>
    </linearGradient>
    <filter id="glow-orange">
      <feGaussianBlur stdDeviation="1.5" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Fond hexagonal -->
  <polygon points="100,8 178,52 178,148 100,192 22,148 22,52"
           fill="url(#bg-kafka)" stroke="#f97316" stroke-width="2"/>

  <!-- Hexagone intérieur décoratif -->
  <polygon points="100,28 162,63 162,137 100,172 38,137 38,63"
           fill="none" stroke="#f97316" stroke-width="0.5" opacity="0.3"/>

  <!-- Symbole Kafka : 3 flux parallèles (partitions) avec nœud source et destination -->

  <!-- Nœud source (producteur) -->
  <circle cx="60" cy="80" r="4" fill="#f97316" filter="url(#glow-orange)"/>

  <!-- Flux 1 (partition supérieure) -->
  <g stroke="#f97316" stroke-width="2.5" stroke-linecap="round" fill="none">
    <path d="M 65 78 Q 80 75 95 78" opacity="0.9"/>
    <circle cx="100" cy="80" r="3" fill="#f97316" opacity="0.7"/>
    <path d="M 105 80 Q 120 78 135 80" opacity="0.9"/>
  </g>

  <!-- Flux 2 (partition médiane) -->
  <g stroke="#f97316" stroke-width="2.5" stroke-linecap="round" fill="none">
    <path d="M 65 100 Q 80 100 95 100" opacity="0.8"/>
    <circle cx="100" cy="100" r="3" fill="#f97316" opacity="0.8"/>
    <path d="M 105 100 Q 120 100 135 100" opacity="0.8"/>
  </g>

  <!-- Flux 3 (partition inférieure) -->
  <g stroke="#f97316" stroke-width="2.5" stroke-linecap="round" fill="none">
    <path d="M 65 122 Q 80 125 95 122" opacity="0.7"/>
    <circle cx="100" cy="120" r="3" fill="#f97316" opacity="0.9"/>
    <path d="M 105 122 Q 120 122 135 120" opacity="0.7"/>
  </g>

  <!-- Nœud destination (consommateur) -->
  <circle cx="140" cy="100" r="4" fill="#f97316" filter="url(#glow-orange)"/>

  <!-- Connecteur vertical optionnel (représente Zookeeper coordination) -->
  <g stroke="#f97316" stroke-width="1.5" opacity="0.4" stroke-linecap="round">
    <line x1="100" y1="65" x2="100" y2="75"/>
    <line x1="100" y1="125" x2="100" y2="135"/>
  </g>

  <!-- Petites sphères de synchronisation -->
  <circle cx="85" cy="65" r="1.5" fill="#f97316" opacity="0.6"/>
  <circle cx="115" cy="65" r="1.5" fill="#f97316" opacity="0.6"/>
  <circle cx="85" cy="135" r="1.5" fill="#f97316" opacity="0.6"/>
  <circle cx="115" cy="135" r="1.5" fill="#f97316" opacity="0.6"/>

  <!-- Texte KORE -->
  <text x="100" y="160" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-weight="700"
        font-size="20" fill="#f97316" letter-spacing="3">KORE</text>

  <!-- Texte KAFKA -->
  <text x="100" y="176" text-anchor="middle"
        font-family="'JetBrains Mono', monospace" font-weight="400"
        font-size="10" fill="#f97316" opacity="0.65" letter-spacing="2.5">KAFKA</text>
</svg>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="12" fill="#1a3a6b"/>
  
  <!-- Code brackets < > -->
  <text x="6" y="44" font-family="monospace" font-size="28" font-weight="bold" fill="#2e6db4">&lt;</text>
  <text x="44" y="44" font-family="monospace" font-size="28" font-weight="bold" fill="#2e6db4">&gt;</text>
  
  <!-- AK letters centered -->
  <text x="32" y="42" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">AK</text>
  
  <!-- Small dot accent -->
  <circle cx="32" cy="52" r="2.5" fill="#2e6db4"/>
</svg>
